<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personilsed Dashboard</title>
     <link rel="shortcut icon" href="pd.png" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="main">
    <nav class ='nav'>
        <h2>Productivity Dashboard</h2>
        <i class="ri-sun-fill"></i>
        <!-- <div class="theme">
            <h1>Change Theme</h1> 
        
    </div>  -->
    </nav>

    <section class="allElems">
        <div class="weather">
            <div class="weather-header">
                <p>03 May,2025</p>
                <h1>Saturday, 01:25:59</h1>
                <h2>Mumbai</h2>
            </div>
            <div class="weather-header2">
                <h1>-0.1°C</h1>
                <h2>Light Rain</h2>
                <h3>Perception: 40%</h3>
                <h3>Rain: 30%</h3>
                <h3>Humadity: 40%</h3>
            </div>
        </div>
        <div class="allFeatures"><div class="todo elem" id="0">
            <img src="https://images.unsplash.com/photo-1711580391101-4ff165933d53?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTJ8fG5vdGVib29rJTIwZGFyayUyMHRoZW1lfGVufDB8fDB8fHww" alt="">
            <h2>Todo List</h2>
        </div>
        <div class="todo elem" id="1">
            <img src="https://images.unsplash.com/photo-1672847303926-7e94bc7b300b?q=80&w=687&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="">
            <h2>Daily Planner</h2>
        </div>
        <div class="todo elem" id="2">
            <img src="https://plus.unsplash.com/premium_photo-1661836605108-0ab0e2893aea?q=80&w=688&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="">
            <h2>Motivation</h2>
        </div>
        <div class="todo elem" id="3">
            <img src="https://images.unsplash.com/photo-1731921599470-768728a218fe?q=80&w=687&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="">
            <h2>Pomodoro Timmer</h2>
        </div>
        <!-- <div class="todo elem" id="4">
            <img src="https://images.unsplash.com/photo-1654195131868-cac1d8429d86?q=80&w=1173&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="">
            <h2>Daily Goals</h2>
        </div> -->
    </div>
    </section>

    <section class="OuterElem todo-list-fullpage">
        <button class="back" id="0">Close</button>
        <h2>Todo List</h2>
        <div class="todo-container">
            <div class="addTask">
                <form>
                    <input placeholder="Enter Task" class="inp">
                    <textarea placeholder="Task Description" name ='textarea' id=""></textarea>
                    <div class="markimp">
                        <input type="checkbox" id="check">
                        <label for="check">Mark as important</label>
                    </div>
                    <button>Add Task</button>
                </form>
            </div>
            <div class="allTask">
                <div class="task">
                    <h4>Gym</h4>
                    <button class = 'complete'>Mark as complete</button>
                </div>
            </div>
        </div>
    </section>
    <section class="OuterElem daily-planner-fullpage">
        <button class="back" id="1">Close</button>
        <h2>Daily Planner</h2>
        <div class="planner-container">
        </div>
    </section>

    <section class="OuterElem motivation-fullpage">
        <button class="back" id="2">Close</button>
        <h2>Motivation</h2>
        <div class="OuterElem-motivation-fullpage-container">
            <div class="motivation-fullpage-container-main">
                <div class="heading">
                    <h1>Quote Of The Day</h1>
                    <img src="./quote.png">
                </div>
                <div class="motivation-content"><p></p></div>
                <div class="motivation-footer">
                    <h2>Pawan Pandey</h2>
                </div>
            </div>
        </div>
    </section>

    <section class="OuterElem pomodoro-timer-fullpage">
        <button class="back" id="3">Close</button>
        <h2>Pomodoro Timmer</h2>
        <div class="pomo-container">
            <h1 class="work">Work Session</h1>
            <div class="pomo-container-time">
            <h1> <span class = "min">25</span> : <span class = "sec">00</span></h1>
            </div>
            <div class="button-contain">
                <button class="start">Start</button>
                <button class="stop">Stop</button>
                <button class="reset">Reset</button>
            </div>
        </div>
    </section>

    <!-- <section class="OuterElem daily-goals-fullpage">
        <button class="back" id="4">Close</button>
        <h2>Daily Goals</h2>
    </section> -->

</div>
<script src="./script.js"></script>
</body>

</html>
